name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # The test project targets net10.0; the SDK also builds the net9.0 plugin.
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build Jellyfin.Plugin.LocalMovieSets.sln -c Release

      - name: Test
        run: dotnet test Jellyfin.Plugin.LocalMovieSets.sln -c Release --no-build
